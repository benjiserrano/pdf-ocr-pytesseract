services:
  ocr-api:
    build: .
    container_name: ocr-api
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      OCR_DEFAULT_LANG: ${OCR_DEFAULT_LANG}
      OCR_DEFAULT_DPI: ${OCR_DEFAULT_DPI}
      OCR_DEFAULT_TESS_CONFIG: ${OCR_DEFAULT_TESS_CONFIG}
      OCR_MAX_FILE_SIZE_MB: ${OCR_MAX_FILE_SIZE_MB}
      OCR_AUTO_DETECT_LANG: ${OCR_AUTO_DETECT_LANG}
      OCR_LANG_CANDIDATES: ${OCR_LANG_CANDIDATES}
      OCR_LANG_SAMPLE_PAGES: ${OCR_LANG_SAMPLE_PAGES}